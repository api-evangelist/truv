sources:
  - url: https://docs.truv.com
    type: Documentation
    note: Overview documents the REST base URL https://prod.truv.com/v1 and dual API-key header auth; no WebSocket mentioned.
  - url: https://docs.truv.com/reference
    type: APIReference
    note: All documented endpoints are HTTPS REST.
  - url: https://docs.truv.com/docs/webhooks
    type: Documentation
    note: Asynchronous events are delivered as HMAC-signed HTTP webhooks (X-WEBHOOK-SIGN header), not WebSocket.
  - url: https://docs.truv.com/openapi.yaml
    type: OpenAPI
    note: Truv publishes an OpenAPI definition describing its REST surface.
actions:
  asyncapiPath: null
  apisYmlUpdated: true
  reason: |
    No WebSocket or SSE protocol surface exists. Truv's only asynchronous
    delivery mechanism is HMAC-signed HTTP webhooks, which fall outside the
    AsyncAPI streaming-transport scope applied here, so no AsyncAPI document
    was authored. The REST API is captured in openapi/truv-openapi.yml and the
    webhook management endpoints are represented there.
