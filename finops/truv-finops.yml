principles:
- name: Visibility
  description: Track successful vs. failed link attempts and per-product verification counts against the order form.
- name: Allocation
  description: Tag access keys / bridge tokens per workflow or team and map to internal cost centers.
- name: Optimization
  description: Maximize connection success rate (provider coverage, retries, consumer UX) to avoid paying for or repeating failed verifications; use webhooks to avoid redundant report pulls.
- name: Accountability
  description: Assign owners per integration and review verification spend against budget and conversion.
