description: >-
  FinOps view of Truv spend. Truv bills under a sales-negotiated commercial
  agreement, typically per successful verification or per completed consumer
  connection (link), priced by product - employment verification, income
  verification, deposit switch, paystatements, and insurance. The sandbox
  is free; production is metered per successful outcome. There is no public
  self-service price list, so cost management centers on maximizing
  successful-connection conversion and avoiding wasted (failed) link
  attempts.
notes: >-
  Per-verification rates are sales-quoted and subject to the commercial
  agreement; verify against your Truv order form during reconciliation.
sources:
