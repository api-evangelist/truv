aid: truv
url: https://raw.githubusercontent.com/api-evangelist/truv/refs/heads/main/apis.yml
name: Truv
kind: company
description: Truv provides consumer-permissioned access to payroll, income, and
  employment data. Its platform lets applicants connect their payroll accounts to
  instantly verify income and employment, retrieve pay statements, and switch
  direct deposit, replacing manual document collection and legacy verification
  services across lending, background screening, and fintech workflows.
image: https://kinlane-images.s3.amazonaws.com/shared/apis-json/apis-json-logo.jpg
tags:
- Income Verification
- Employment Verification
- Payroll
- Direct Deposit
- Consumer Permissioned Data
- Fintech
created: '2026-07-01'
modified: '2026-07-01'
specificationVersion: '0.19'
